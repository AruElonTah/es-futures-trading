[project]
name = "trading-core"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pandas>=2.2,<3.0",
    "pyarrow>=17.0,<18.0",  # pinned for data_hash byte-stability — see 01-RESEARCH.md Pattern 7
    "duckdb>=1.0,<2.0",
    "pydantic>=2.13,<3.0",
    "pydantic-settings>=2.5",
    "httpx>=0.27,<0.28",
    "structlog>=25.0",
    "concurrent-log-handler",
    "pandas-market-calendars>=5.3,<6.0",
    "uuid6>=2025.0,<2026.0",
    "rich",
    "mcp>=1.0,<2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trading_core"]
