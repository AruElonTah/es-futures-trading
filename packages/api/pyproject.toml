[project]
name = "es-api"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "trading-core",
    "fastapi>=0.136,<0.137",
    "uvicorn[standard]>=0.32,<0.33",
]

[tool.uv.sources]
trading-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
